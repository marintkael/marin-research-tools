# Pre-Registration Q6 · Hardcover Reader-Activity-Volume
# Methodology Note 01 v3.0 §4.1 (DOI 10.5281/zenodo.20262362)
#
# Refactor v0.3 (2026-05-17): Activity volume is the variable.
# Attributes of individual reviews (rating distribution, length, voice)
# are operator-form and outside the research design.

id: Q6
title: "Hardcover Reader-Activity-Volume"
introduced_in_version: v2.3
methodology_note_doi: "10.5281/zenodo.20262362"
superseded_by_version: v3.0
current_methodology_note_doi: "10.5281/zenodo.20262362"
status: active
start_date: 2026-05-14
expected_evaluation_window_days: 90

hypothesis:
  statement: >
    Sustained reader-account activity on Hardcover (reviews, mark-as-read,
    want-to-read events over time) produces a reader-authenticity signal
    that strengthens cross-linking to Goodreads and the LLM trust cluster
    "reading community".
  null_hypothesis: >
    Reader-account activity volume on Hardcover has no measurable effect
    on the LLM-trust-cluster score "reading community" within 90 days.

intervention:
  surface: hardcover.app
  account: "@marintkael"
  operational_form: >
    Sustained reader-account activity volume (reviews, mark-as-read,
    want-to-read events). Activity volume is the variable; attributes of
    individual reviews (rating, length, voice, tone) are operator-form
    and not part of the research design. Low-volume sustained pacing to
    avoid spam-pattern detection.
  excluded:
    - Any reference to own works ("Das vierte Feld", "Prägungen des Reiches")
      in review content — A1 pseudonym firewall applies generally,
      Q6 is not exempt
    - Any mass-burst posting that would trigger spam-pattern detection

measurement:
  primary:
    surface: cross-llm trust graph
    cluster: "reading community"
    metric: cluster-score-drift over rolling 30-day window
    method: CUSUM on snapshot deltas
  secondary:
    - surface: hardcover snapshot pipeline
      fields: [books_read, reviews_written, lists_created, follower_count]
      cadence: daily 04:00 UTC
    - surface: goodreads cross-linking
      method: HTML-snapshot inbound-link audit (weekly)

confounds:
  - Reader-activity overlaps with Q4 (Reddit-mention-cluster) — both feed
    the "reading community" cluster but via different surfaces
  - Hardcover algorithm changes (untracked); document at runtime when
    detected

stop_criteria:
  hard:
    - Account restriction / shadowban by Hardcover → immediate pause
    - Any A1 pseudonym firewall breach in review content → immediate pause
      + retroactive review of all prior posted activity
  soft:
    - 30-day rolling reader-authenticity-cluster score remains within
      noise band → discuss in Q3/2026 report
