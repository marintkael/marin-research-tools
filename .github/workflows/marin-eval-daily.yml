name: Marin Daily Eval (lm-evaluation-harness)

# 2026-05-25 v4.4: Cron-Trigger DEAKTIVIERT. Operator-Direktive: "github soll
# generell nichts von sich aus machen … nur cloudflare und die workers arbeiten".
# Worker `marin-research-pipeline` (Cron 04:00 UTC) collects ALL Provider-Daten
# selbst (incl. claude_web_scrape Stage v3.3 für 3 Tiers + ai_citation für
# 2 OpenAI-Modelle + Gemini). Action bleibt für ad-hoc lm-eval-Validation-Runs
# (Methodology-Reproducibility) via manual workflow_dispatch.
on:
  workflow_dispatch:
    # Manual trigger ONLY — keine automatischen schedule-Trigger.

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install harness + deps
        run: |
          python -m pip install --upgrade pip
          pip install "lm-eval[api]==0.4.12" requests

      - name: Stage claude_web sweeps to /tmp/marin_sweep
        # 2026-05-25 v4.3: priorisiert R2-Bucket (Worker `claude_web_scrape` stage
        # uploaded JSON-Files dorthin), Fallback auf Repo-checked-in sweeps.
        # Worker produziert sweeps Cron 04:00 UTC, Action läuft 04:30 UTC — 30 min
        # Vorlauf reicht für Browser-Rendering von 16 Q × 3 Tiers (~28 min).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "3cff4d60f16032d78a178305caf97264"
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p /tmp/marin_sweep
          # Primary: R2 sync from claude_web_sweep/DATE/
          echo "[sweeps] attempting R2 sync from claude_web_sweep/${DATE}/"
          R2_LIST=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/marin-research-raw/objects?prefix=claude_web_sweep/${DATE}/")
          R2_KEYS=$(echo "$R2_LIST" | python3 -c "import sys,json; d=json.load(sys.stdin); r=(d.get('result') or {}); objs=r.get('objects') if isinstance(r,dict) else r; [print(o['key']) for o in (objs or [])]")
          R2_COUNT=$(echo "$R2_KEYS" | grep -c "_opus.json\|_sonnet.json\|_haiku.json" || true)
          if [ "$R2_COUNT" -gt 0 ]; then
            for KEY in $R2_KEYS; do
              FNAME=$(basename "$KEY")
              # Use wrangler for object get (avoids URL-encoding issues with slashes)
              npx --yes wrangler@3 r2 object get "marin-research-raw/${KEY}" --pipe > "/tmp/marin_sweep/${FNAME}" 2>/dev/null || true
            done
            echo "[sweeps] R2 sync done · $(ls /tmp/marin_sweep/ | wc -l) files"
          else
            echo "[sweeps] R2 empty for ${DATE} · falling back to repo sweeps"
            if [ -d "research-harness/sweeps/${DATE}" ]; then
              cp research-harness/sweeps/${DATE}/*.json /tmp/marin_sweep/ 2>/dev/null || true
              echo "[sweeps] repo fallback staged $(ls /tmp/marin_sweep/ | wc -l) files"
            else
              echo "[sweeps] no repo sweeps either — claude_web models will load 0 entries"
            fi
          fi

      - name: Run all models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MARIN_RESEARCH_TRIGGER_TOKEN: ${{ secrets.MARIN_RESEARCH_TRIGGER_TOKEN }}
        run: |
          cd research-harness
          # Auto-skip tier if no sweep files present. Opus/Sonnet/Haiku each check
          # for their own glob; if Worker only uploaded a subset, the others skip.
          SKIP_LIST=""
          if ! ls /tmp/marin_sweep/*_opus.json >/dev/null 2>&1; then
            SKIP_LIST="claude_opus_4_7_web"
          fi
          if ! ls /tmp/marin_sweep/*_sonnet.json >/dev/null 2>&1; then
            SKIP_LIST="${SKIP_LIST:+${SKIP_LIST},}claude_sonnet_4_6_web"
          fi
          if ! ls /tmp/marin_sweep/*_haiku.json >/dev/null 2>&1; then
            SKIP_LIST="${SKIP_LIST:+${SKIP_LIST},}claude_haiku_4_5_web"
          fi
          echo "[run] skip=${SKIP_LIST:-<none>}"
          python run_all_models.py \
            ${SKIP_LIST:+--skip ${SKIP_LIST}} \
            --output results/snapshot_$(date +%Y%m%d).json

      - name: Push snapshot to D1
        if: success()
        env:
          MARIN_RESEARCH_TRIGGER_TOKEN: ${{ secrets.MARIN_RESEARCH_TRIGGER_TOKEN }}
        run: |
          cd research-harness
          python push_snapshot_to_d1.py --snapshot results/snapshot_$(date +%Y%m%d).json

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marin-eval-snapshot-${{ github.run_id }}
          path: research-harness/results/snapshot_*.json
          retention-days: 90
